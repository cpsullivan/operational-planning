                  Patch('Bp Activities',
                      LookUp('Bp Activities', activity_id = edit.ma_activityid),
                      {funds_allocated: edit.ma_funds_allocated}
                  )
              );
              ClearCollect(colActivities, Filter('Bp Activities', IsEmpty(colUserScope) || 'Business Unit ID' in colUserScope.business_unit_id));
              ClearCollect(colFilteredStatus, Filter(ForAll('Bp Activity Status' As statusRow, With({act: LookUp(colActivities, activity_id = statusRow.ma_activityid)}, {ma_activitystatusid: statusRow.ma_activitystatusid, ma_activityid: statusRow.ma_activityid, crb7f_fiscal_year: statusRow.crb7f_fiscal_year.fiscal_year, ma_quarter: LookUp(colStatusQtrMap, ma_activitystatusid = statusRow.ma_activitystatusid).qtr, ma_approval_status: statusRow.ma_approval_status & "", ma_activity_status: statusRow.ma_activity_status & "", ma_funds_obligated: statusRow.ma_funds_obligated, ma_funds_disbursed: statusRow.ma_funds_disbursed, ma_activity_name: act.activity, ma_businessunitid: act.'Business Unit ID', ma_business_plan: act.'Business Plan', ma_intention_id: act.'Intention List Key', ma_funds_allocated: act.funds_allocated, ma_activity_type: act.activity_type & "", ma_is_dm_pa: act.is_dm_pa & "", ma_outcome_id: LookUp(colKeyObjective, key_objective_id = act.'Key Objective ID').outcome_id})), !IsBlank(ma_activity_name) && (locDashFilters.quarter = "All" || ma_quarter = locDashFilters.quarter) && (locDashFilters.business_plan = "All" || ma_business_plan = locDashFilters.business_plan) && (locDashFilters.intention_id = "All" || ma_intention_id = locDashFilters.intention_id) && (locDashFilters.business_unit_id = "All" || ma_businessunitid = locDashFilters.business_unit_id) && (locDashFilters.activity_type = "All" || ma_activity_type = locDashFilters.activity_type) && (locDashFilters.is_dm_pa = "All" || Text(ma_is_dm_pa) = locDashFilters.is_dm_pa) && (locDashFilters.outcome_id = "All" || ma_outcome_id = locDashFilters.outcome_id)));
              Set(locReallocPanelOpen, false);
              Clear(colReallocEdits)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(8, 42, 67, 1)
