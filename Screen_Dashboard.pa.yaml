Screens:
  Screen_Dashboard:
    Properties:
      ContentLanguage: ="en-CA"
      Fill: =RGBA(248, 249, 250, 1)
      LoadingSpinnerColor: =RGBA(0, 51, 102, 1)
      OnVisible: |-
        =UpdateContext({locDashFilters: {
            fiscal_year: "All",
            quarter: "All",
            activity_type: "All",
            business_plan: "All",
            intention_id: "All",
            is_dm_pa: "All",
            business_unit_id: "All",
            outcome_id: "All"
        }});
        Set(locReallocPanelOpen, false);
        Clear(colReallocEdits);
        ClearCollect(colStatusRows, 'Bp Activity Status');
        ClearCollect(colFilteredStatus,
            Filter(
                ForAll(colStatusRows As statusRow,
                    With({act: LookUp(colActivities, ma_activityid = statusRow.crb7f_activity_id.ma_activityid)},
                        {
                            ma_activitystatusid: statusRow.ma_activitystatusid,
                            ma_activityid:       statusRow.crb7f_activity_id.ma_activityid,
                            ma_fiscal_year:      statusRow.crb7f_fiscal_year.fiscal_year,
                            ma_quarter:          LookUp(colStatusQtrMap, ma_activitystatusid = statusRow.ma_activitystatusid).qtr,
                            ma_approval_status:  statusRow.ma_approval_status & "",
                            ma_activity_status:  statusRow.ma_activity_status & "",
                            ma_funds_obligated:  statusRow.funds_obligated,
                            ma_funds_disbursed:  statusRow.funds_disbursed,
                            ma_activity_name:    act.ma_activity,
                            ma_businessunitid:   act.ma_businessunitid,
                            ma_business_plan:    act.business_plan,
                            ma_intention_id:     act.ma_intentionlistkey,
                            ma_funds_allocated:  act.ma_funds_allocated,
                            ma_activity_type:    act.ma_activity_type & "",
                            ma_is_dm_pa:         act.ma_is_dm_pa & "",
                            ma_outcome_id:       LookUp(colKeyObjective, key_objective_id = act.ma_keyobjectiveid).outcome_id
                        }
                    )
                ),
                !IsBlank(ma_activity_name) &&
                (locDashFilters.fiscal_year = "All" || ma_fiscal_year = locDashFilters.fiscal_year) &&
                (locDashFilters.quarter = "All" || ma_quarter = locDashFilters.quarter) &&
                (locDashFilters.business_plan = "All" || ma_business_plan = locDashFilters.business_plan) &&
                (locDashFilters.intention_id = "All" || ma_intention_id = locDashFilters.intention_id) &&
                (locDashFilters.business_unit_id = "All" || ma_businessunitid = locDashFilters.business_unit_id) &&
                (locDashFilters.activity_type = "All" || ma_activity_type = locDashFilters.activity_type) &&
                (locDashFilters.is_dm_pa = "All" || ma_is_dm_pa = locDashFilters.is_dm_pa) &&
                (locDashFilters.outcome_id = "All" || ma_outcome_id = locDashFilters.outcome_id)
            )
        );
        ClearCollect(colBusinessPlanOptions, Table({Value: "All"}));
        Collect(colBusinessPlanOptions, Distinct('Bp Activities', business_plan));
        ClearCollect(colIntentionOptions, Table({Value: "All"}));
        Collect(colIntentionOptions, Distinct(colIntention, intention_id));
        ClearCollect(colSpendingChart,
            {FundType: "Allocated", Q1: Sum(Filter(colFilteredStatus, ma_quarter = "Q1"), ma_funds_allocated), Q2: Sum(Filter(colFilteredStatus, ma_quarter = "Q2"), ma_funds_allocated), Q3: Sum(Filter(colFilteredStatus, ma_quarter = "Q3"), ma_funds_allocated), Q4: Sum(Filter(colFilteredStatus, ma_quarter = "Q4"), ma_funds_allocated)},
            {FundType: "Obligated", Q1: Sum(Filter(colFilteredStatus, ma_quarter = "Q1"), ma_funds_obligated), Q2: Sum(Filter(colFilteredStatus, ma_quarter = "Q2"), ma_funds_obligated), Q3: Sum(Filter(colFilteredStatus, ma_quarter = "Q3"), ma_funds_obligated), Q4: Sum(Filter(colFilteredStatus, ma_quarter = "Q4"), ma_funds_obligated)},
            {FundType: "Disbursed", Q1: Sum(Filter(colFilteredStatus, ma_quarter = "Q1"), ma_funds_disbursed), Q2: Sum(Filter(colFilteredStatus, ma_quarter = "Q2"), ma_funds_disbursed), Q3: Sum(Filter(colFilteredStatus, ma_quarter = "Q3"), ma_funds_disbursed), Q4: Sum(Filter(colFilteredStatus, ma_quarter = "Q4"), ma_funds_disbursed)}
        );
        Set(locChartMax,
            Max(
                LookUp(colSpendingChart, FundType = "Allocated").Q1,
                LookUp(colSpendingChart, FundType = "Allocated").Q2,
                LookUp(colSpendingChart, FundType = "Allocated").Q3,
                LookUp(colSpendingChart, FundType = "Allocated").Q4,
                LookUp(colSpendingChart, FundType = "Obligated").Q1,
                LookUp(colSpendingChart, FundType = "Obligated").Q2,
                LookUp(colSpendingChart, FundType = "Obligated").Q3,
                LookUp(colSpendingChart, FundType = "Obligated").Q4,
                LookUp(colSpendingChart, FundType = "Disbursed").Q1,
                LookUp(colSpendingChart, FundType = "Disbursed").Q2,
                LookUp(colSpendingChart, FundType = "Disbursed").Q3,
                LookUp(colSpendingChart, FundType = "Disbursed").Q4
            )
        )
    Children:
      - Dash_Chart_Gallery:
          Control: Gallery@2.15.0
          Variant: Horizontal
          Properties:
            Height: =Dash_ChartBG.Y + Dash_ChartBG.Height - Self.Y - 0
            Items: |-
              =Table(
                    {Qtr: "Q1",
                     Alloc: LookUp(colSpendingChart, FundType = "Allocated").Q1,
                     Obl:   LookUp(colSpendingChart, FundType = "Obligated").Q1,
                     Disb:  LookUp(colSpendingChart, FundType = "Disbursed").Q1},
                    {Qtr: "Q2",
                     Alloc: LookUp(colSpendingChart, FundType = "Allocated").Q2,
                     Obl:   LookUp(colSpendingChart, FundType = "Obligated").Q2,
                     Disb:  LookUp(colSpendingChart, FundType = "Disbursed").Q2},
                    {Qtr: "Q3",
                     Alloc: LookUp(colSpendingChart, FundType = "Allocated").Q3,
                     Obl:   LookUp(colSpendingChart, FundType = "Obligated").Q3,
                     Disb:  LookUp(colSpendingChart, FundType = "Disbursed").Q3},
                    {Qtr: "Q4",
                     Alloc: LookUp(colSpendingChart, FundType = "Allocated").Q4,
                     Obl:   LookUp(colSpendingChart, FundType = "Obligated").Q4,
                     Disb:  LookUp(colSpendingChart, FundType = "Disbursed").Q4}
                )
            ShowScrollbar: =false
            TemplatePadding: =1
            TemplateSize: =88
            Width: =Dash_ChartBG.Width - 0
            WrapCount: =3
            X: =Dash_ChartBG.X + 0
            Y: =Dash_ChartTitle.Y + 23
          Children:
            - Chart_Bar_Disb:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =RGBA(0, 112, 68, 1)
                  Height: =IfError(ThisItem.Obl / locChartMax, 0) * (Parent.TemplateHeight - 28)
                  OnSelect: =Select(Parent)
                  Width: =22
                  X: =56
                  Y: =Parent.TemplateHeight - 24 - Self.Height
            - Chart_Bar_Obl:
