Screens:
  Screen_Home:
    Properties:
      Fill: =RGBA(248, 249, 250, 1)
      LoadingSpinnerColor: =RGBA(0, 51, 102, 1)
    Children:
      - Nav_Admin_Btn:
          Control: Classic/Button@2.2.0
          Properties:
            Align: =%Align.RESERVED%.Center
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderStyle: =%BorderStyle.RESERVED%.Solid
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            DisplayMode: =%DisplayMode.RESERVED%.Edit
            Fill: =RGBA(12, 59, 94, 1)
            Font: =%Font.RESERVED%.'Open Sans'
            FontWeight: =%FontWeight.RESERVED%.Normal
            Height: =60
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(17, 80, 128, 1)
            OnSelect: =Navigate(Screen_Admin, ScreenTransition.Fade)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(8, 42, 67, 1)
            Size: =13
            Text: ="Admin Panel"
            VerticalAlign: =%VerticalAlign.RESERVED%.Middle
            Visible: =locUserRole = "ADMIN"
            Width: =220
            X: =(Parent.Width - 220) / 2
            Y: =450
      - Nav_Reports_Btn:
          Control: Classic/Button@2.2.0
          Properties:
            Align: =%Align.RESERVED%.Center
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderStyle: =%BorderStyle.RESERVED%.Solid
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            DisplayMode: =%DisplayMode.RESERVED%.Edit
            Fill: =RGBA(12, 59, 94, 1)
            Font: =%Font.RESERVED%.'Open Sans'
            FontWeight: =%FontWeight.RESERVED%.Normal
            Height: =60
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(17, 80, 128, 1)
            OnSelect: =Navigate(Screen_Reports, ScreenTransition.Fade)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(8, 42, 67, 1)
            Size: =13
            Text: ="Reports"
            VerticalAlign: =%VerticalAlign.RESERVED%.Middle
            Visible: =locUserRole in ["MGR","SUP","DIR","ED","ADMO","ADMIN"]
            Width: =220
            X: =(Parent.Width - 220) / 2
            Y: =370
      - Nav_Review_Btn:
          Control: Classic/Button@2.2.0
          Properties:
            Align: =%Align.RESERVED%.Center
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderStyle: =%BorderStyle.RESERVED%.Solid
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            DisplayMode: =%DisplayMode.RESERVED%.Edit
            Fill: =RGBA(12, 59, 94, 1)
            Font: =%Font.RESERVED%.'Open Sans'
            FontWeight: =%FontWeight.RESERVED%.Normal
            Height: =60
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(17, 80, 128, 1)
            OnSelect: =Navigate(Screen_Review, ScreenTransition.Fade)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(8, 42, 67, 1)
            Size: =13
            Text: ="Review & Approve"
            VerticalAlign: =%VerticalAlign.RESERVED%.Middle
            Visible: =locUserRole in ["DIR", "ED", "ADMO"]
            Width: =220
            X: =(Parent.Width - 220) / 2
            Y: =290
      - Nav_ActivityEntry_Btn:
          Control: Classic/Button@2.2.0
          Properties:
            Align: =%Align.RESERVED%.Center
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderStyle: =%BorderStyle.RESERVED%.Solid
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            DisplayMode: =%DisplayMode.RESERVED%.Edit
            Fill: =RGBA(12, 59, 94, 1)
            Font: =%Font.RESERVED%.'Open Sans'
            FontWeight: =%FontWeight.RESERVED%.Normal
            Height: =60
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(17, 80, 128, 1)
            OnSelect: =Navigate(Screen_ActivityEntry, ScreenTransition.Fade)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(8, 42, 67, 1)
            Size: =13
            Text: ="Activity Entry"
            VerticalAlign: =%VerticalAlign.RESERVED%.Middle
            Visible: =locUserRole in ["MGR", "SUP"]
            Width: =220
            X: =(Parent.Width - 220) / 2
            Y: =290
      - Nav_Dashboard_Btn:
          Control: Classic/Button@2.2.0
          Properties:
            Align: =%Align.RESERVED%.Center
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderStyle: =%BorderStyle.RESERVED%.Solid
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            DisplayMode: =%DisplayMode.RESERVED%.Edit
            Fill: =RGBA(12, 59, 94, 1)
            Font: =%Font.RESERVED%.'Open Sans'
            FontWeight: =%FontWeight.RESERVED%.Normal
            Height: =60
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =RGBA(17, 80, 128, 1)
            OnSelect: =Navigate(Screen_Dashboard, ScreenTransition.Fade)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(8, 42, 67, 1)
            Size: =13
            Text: ="Dashboard"
            VerticalAlign: =%VerticalAlign.RESERVED%.Middle
            Width: =220
            X: =(Parent.Width - 220) / 2
            Y: =210
      - Home_Subtitle:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 1)
            Color: =RGBA(100, 100, 100, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Open Sans'
            Height: =30
            Text: ="Select a section to continue"
            Width: =400
            X: =(Parent.Width - 400) / 2
            Y: =155
      - Home_Title:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 1)
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.Arial
            FontWeight: =FontWeight.Semibold
            Height: =60
            Size: =22
            Text: ="TCS Operational Planning"
            Width: =600
            X: =(Parent.Width - 600) / 2
            Y: =90
      - Home_User_Label:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 0, 0, 1)
            Color: =RGBA(255, 255, 255, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Open Sans'
            Height: =30
            Size: =12
            Text: =locUserDisplayName & "  |  " & locUserRole
            Width: =400
            X: =Parent.Width - 420
            Y: =22
      - Home_Header_BG:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 255, 1)
            Fill: =RGBA(12, 59, 94, 1)
            Height: =70
            Width: =Parent.Width
