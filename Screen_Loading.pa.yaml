Screens:
  Screen_Loading:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(0, 51, 102, 1)
      OnVisible: |-
        =Set(locLoadError, "");
        Set(locReadyToNavigate, false);
        Set(locUserEmail, IfError(Lower(Office365Users.MyProfile().Mail), ""));
        If(
            IsBlank(locUserEmail),
            Set(locLoadError, "Could not retrieve your profile. Try refreshing the app."),
            Set(locCurrentUser, LookUp(Users, Lower(email) = locUserEmail));
            If(
                IsBlank(locCurrentUser),
                Set(locLoadError, "Your account is not provisioned in this app. Contact your administrator."),
                Set(locUserRole,        Text(locCurrentUser.role));
                Set(locUserId,          locCurrentUser.user_id);
                Set(locUserDisplayName, locCurrentUser.ma_display_name);
                Set(locIsAdmin,         Text(locCurrentUser.role) = "ADMIN");
                If(
                    locUserRole in ["ADMO", "ADMIN"],
                    Clear(colUserScope),
                    ClearCollect(colUserScope, Filter('Junction BU IDs', user_id = locUserId))
                );
                Concurrent(
                    ClearCollect(colBusinessUnitID, 'Lookup Business Units'),
                    ClearCollect(colBusinessPlan,   lookup_business_plans),
                    ClearCollect(colOutcome,        bp_outcomes),
                    ClearCollect(colKeyObjective,   bp_key_objectives),
                    ClearCollect(colInitiative,     bp_initiatives),
                    ClearCollect(colStrategy,       people_plan_strategies),
                    ClearCollect(colIntention,      people_plan_intentions),
                    ClearCollect(colFiscalYear,     'Lookup_Fiscal_Yearss'),
                    ClearCollect(colMetricNumber,   bp_performance_metrics),
                    ClearCollect(colTarget,         bp_performance_metric_targets),
                    ClearCollect(colActivities,     Filter('Bp Activities', IsEmpty(colUserScope) || 'Business Unit ID' in colUserScope.business_unit_id)),
                    ClearCollect(colStatusQtrMap,   ForAll('Bp Activity Status' As r, {ma_activitystatusid: r.ma_activitystatusid, qtr: Text(r.crb7f_quarter)}))
                );
                Set(locReadyToNavigate, true)
            )
        )
    Children:
      - Error_Label:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 1)
            Color: =RGBA(196, 0, 0, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Open Sans'
            Height: =60
            Size: =14
            Text: =locLoadError
            Visible: =!IsBlank(locLoadError)
            Width: =500
            X: =(Parent.Width - 500) / 2
            Y: =(Parent.Height / 2) - 30
      - Loading_Label:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 0, 0, 1)
            Color: =RGBA(71, 69, 64, 1)
            DisabledColor: =RGBA(186, 186, 186, 1)
            Font: =Font.'Open Sans'
            Size: =14
            Text: ="Loading…"
            Visible: =IsBlank(locLoadError)
            Width: =300
            X: =(Parent.Width - 300) / 2
            Y: =(Parent.Height / 2) + 50
      - Load_Timer:
          Control: Timer@2.1.0
          Properties:
            Align: =%Align.RESERVED%.Center
            AutoStart: =true
            BorderColor: =ColorFade(Self.Fill, -15%)
            BorderStyle: =%BorderStyle.RESERVED%.Solid
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            DisplayMode: =%DisplayMode.RESERVED%.Edit
            Duration: =500
            Fill: =RGBA(35, 31, 32, 1)
            Font: =%Font.RESERVED%.'Open Sans'
            FontWeight: =%FontWeight.RESERVED%.Normal
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =Self.Color
            HoverFill: =ColorFade(Self.Fill, 20%)
            OnTimerEnd: =If(locReadyToNavigate, Navigate(Screen_Home, ScreenTransition.Fade))
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Repeat: =true
            VerticalAlign: =%VerticalAlign.RESERVED%.Middle
            Visible: =false
